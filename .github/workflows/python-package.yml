name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true
          cache-python: true
          cache-suffix: lint-py3.13
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Sync lint environment
        run: uv sync --locked --group dev
      - name: Lint for syntax errors
        run: uv run --frozen ruff check . --select=E9,F63,F7,F82
      - name: Lint with Ruff
        run: uv run --frozen ruff check . --exit-zero

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: true
          cache-suffix: test-py${{ matrix.python-version }}
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Sync test environment
        run: uv sync --locked --group test
      - name: Run tests
        run: uv run --frozen pytest

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true
          cache-python: true
          cache-suffix: build-py3.13
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Build package
        run: uv build
