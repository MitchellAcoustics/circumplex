name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-python: true
          cache-suffix: lint-py3.12
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Sync lint environment
        run: uv sync --locked --group dev
      - name: Lint for syntax errors
        run: uv run --frozen ruff check . --select=E9,F63,F7,F82
      - name: Lint with Ruff
        run: uv run --frozen ruff check . --exit-zero

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            tox-env: py311
          - python-version: "3.12"
            tox-env: py312
          - python-version: "3.13"
            tox-env: py313

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: true
          cache-suffix: test-py${{ matrix.python-version }}
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Sync tox runner
        run: uv sync --locked --group ci
      - name: Run tests with tox
        run: uv run tox run -e ${{ matrix.tox-env }}

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-python: true
          cache-suffix: build-py3.13
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Build package
        run: uv build
